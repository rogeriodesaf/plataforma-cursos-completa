services:
  postgres:
    image: postgres:16
    container_name: plataforma-cursos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: plataforma_cursos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
